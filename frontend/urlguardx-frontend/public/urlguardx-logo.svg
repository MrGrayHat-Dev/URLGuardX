<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Cybernetic Cyan to Blue Gradient -->
    <linearGradient id="cyberGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="50%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    
    <!-- Deep Space Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <!-- Neon Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer Glowing Shield Outline -->
  <path d="M256 32 L448 96 L448 224 C448 360 256 480 256 480 C256 480 64 360 64 224 L64 96 L256 32 Z" 
        fill="url(#bgGradient)" 
        stroke="url(#cyberGradient)" 
        stroke-width="16" 
        stroke-linejoin="round"
        filter="url(#neonGlow)"/>

  <!-- Inner Tech Circuit Framing -->
  <path d="M256 80 L400 130 L400 230 C400 320 256 415 256 415 C256 415 112 320 112 230 L112 130 L256 80 Z" 
        fill="none" 
        stroke="#06b6d4" 
        stroke-width="4" 
        stroke-dasharray="12 6"
        opacity="0.6"/>

  <!-- The "X" Intersection -->
  <path d="M170 180 L342 332" stroke="#22d3ee" stroke-width="28" stroke-linecap="round" filter="url(#neonGlow)"/>
  <path d="M342 180 L170 332" stroke="#3b82f6" stroke-width="28" stroke-linecap="round" filter="url(#neonGlow)"/>

  <!-- Central Processing Node (The "Eye/Core") -->
  <circle cx="256" cy="256" r="32" fill="#020617" stroke="#0ea5e9" stroke-width="8" filter="url(#neonGlow)"/>
  <circle cx="256" cy="256" r="12" fill="#38bdf8" />
  
  <!-- Data nodes on the shield points -->
  <circle cx="256" cy="32" r="8" fill="#22d3ee" filter="url(#neonGlow)"/>
  <circle cx="64" cy="96" r="8" fill="#22d3ee" filter="url(#neonGlow)"/>
  <circle cx="448" cy="96" r="8" fill="#22d3ee" filter="url(#neonGlow)"/>
</svg>