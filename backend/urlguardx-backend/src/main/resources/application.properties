# ============================================================
#  URLGuardX — Application Configuration
#  Replace all placeholder values with your real API keys.
# ============================================================

server.port=8080

# --- Database (H2 in-memory for development) ----------------
spring.datasource.url=jdbc:h2:mem:urlguardxdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Google Gemini AI (get key from https://aistudio.google.com) ---
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent
gemini.api.key=AIzaSyD1I-VUO0ySrIbdix5QmVATBNipgAjzCrw

urlhaus.feed.enabled=true

# --- WHOIS XML API (get key from https://whois.whoisxmlapi.com) ---
whois.api.key=at_MjXdaSBOpxnX6loTKtdk9kb0Vozwn

whois.api.url=https://www.whoisxmlapi.com/whoisserver/WhoisService
google.safe.api.key=AIzaSyB-e-OJXi26YEobSOn8QBtGNFtqb46HtwQ
google.safe.api.url=https://safebrowsing.googleapis.com/v4/threatMatches:find
# --- Lexical Model CSV path (place phishing_urls.csv in src/main/resources/) ---
lexical.csv.path=phishing_urls.csv

# --- Risk Score Weights (must sum to 1.0) --------------------
risk.weight.lexical=0.30
risk.weight.blacklist=0.35
risk.weight.ssl=0.20
risk.weight.domain=0.15

# ----cors----
app.cors.allowed-origins=http://localhost:5173,https://your-frontend-domain.com

# -----Timeout-----
spring.mvc.async.request-timeout=5000

# --- Logging ---
logging.level.com.fyrp.urlguardx=DEBUG
logging.level.org.springframework.web=INFO
