# ============================================================
#  URLGuardX ? Production Ready Configuration
# ============================================================

# ---------- SERVER ----------
server.port=${PORT:10000}

# ---------- DATABASE (H2 for now) ----------
spring.datasource.url=jdbc:h2:mem:urlguardxdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Disable console in production (important)
spring.h2.console.enabled=false


# ---------- ML SERVICE ----------
ML_SERVICE_URL=${ML_SERVICE_URL}


# ---------- GEMINI ----------
gemini.api.url=${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent}
gemini.api.key=${GEMINI_API_KEY}


# ---------- WHOIS ----------
whois.api.key=${WHOIS_API_KEY}
whois.api.url=https://www.whoisxmlapi.com/whoisserver/WhoisService


# ---------- GOOGLE SAFE ----------
google.safe.api.key=${GOOGLE_SAFE_API_KEY}
google.safe.api.url=https://safebrowsing.googleapis.com/v4/threatMatches:find


# ---------- URLHAUS ----------
urlhaus.feed.enabled=true


# ---------- RISK ENGINE ----------
risk.weight.lexical=0.30
risk.weight.blacklist=0.35
risk.weight.ssl=0.20
risk.weight.domain=0.15


# ---------- CORS ----------
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}


# ---------- TIMEOUT ----------
spring.mvc.async.request-timeout=5000


# ---------- LOGGING ----------
logging.level.com.fyrp.urlguardx=INFO
logging.level.org.springframework.web=INFO