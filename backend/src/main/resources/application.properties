# ============================================================
# URLGuardX - Clean Configuration
# ============================================================

# ---------- SERVER ----------
server.port=${PORT:10000}

# ---------- DATABASE ----------
spring.datasource.url=jdbc:postgresql://dpg-d7r2ipgg4nts73cdvoag-a.internal:5432/urlguardx_db_3hpj?sslmode=require
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Connection pool settings
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5

# ---------- EXTERNAL SERVICES ----------
ML_SERVICE_URL=${ML_SERVICE_URL}

gemini.api.url=${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent}
gemini.api.key=${GEMINI_API_KEY}

whois.api.url=https://www.whoisxmlapi.com/whoisserver/WhoisService
whois.api.key=${WHOIS_API_KEY}

google.safe.api.url=https://safebrowsing.googleapis.com/v4/threatMatches:find
google.safe.api.key=${GOOGLE_SAFE_API_KEY}


# ---------- FEATURES ----------
urlhaus.feed.enabled=true


# ---------- RISK ENGINE ----------
risk.weight.lexical=0.30
risk.weight.blacklist=0.35
risk.weight.ssl=0.20
risk.weight.domain=0.15


# ---------- CORS ----------
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}


# ---------- TIMEOUT ----------
spring.mvc.async.request-timeout=5000


# ---------- LOGGING ----------
logging.level.com.fyrp.urlguardx=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.zaxxer.hikari=DEBUG